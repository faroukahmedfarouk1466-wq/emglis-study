<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>📚 القاموس الشامل + القواعد</title>

  <!-- ===== ربط PWA ===== -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@500;700&family=Tajawal:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    /* ===== BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f5f7fc;
      color: #1a2332;
      font-size: 16px;
      padding: 16px 12px 90px 12px;
      min-height: 100vh;
      transition: background 0.25s, color 0.25s, font-size 0.2s;
    }
    /* ===== THEMES ===== */
    body.light { --bg: #f0f4ff; --card: rgba(255,255,255,0.78); --text: #1a2332; --sub: #3a4a62; --accent: #5e6fdb; --accent-light: #eef1fe; --border: rgba(255,255,255,0.5); --shadow: 0 12px 30px rgba(0,20,40,0.08); }
    body.dark { --bg: #111827; --card: rgba(30,41,59,0.85); --text: #f1f5f9; --sub: #cbd5e1; --accent: #818cf8; --accent-light: #2d3a5e; --border: rgba(71,85,105,0.6); --shadow: 0 12px 30px rgba(0,0,0,0.6); }
    body.nature { --bg: #eaf5e9; --card: rgba(246,252,245,0.85); --text: #1d3b1d; --sub: #2d5a2d; --accent: #3b8b3b; --accent-light: #d8edd8; --border: rgba(180,210,170,0.6); --shadow: 0 12px 30px rgba(20,60,20,0.08); }
    body.warm { --bg: #fff0e6; --card: rgba(255,248,240,0.85); --text: #442b1a; --sub: #6b4c33; --accent: #d97747; --accent-light: #fce8d6; --border: rgba(230,190,160,0.5); --shadow: 0 12px 30px rgba(80,40,10,0.1); }
    body.matrix { --bg: #0a0f0a; --card: rgba(0,20,0,0.8); --text: #00ff41; --sub: #66b866; --accent: #00ff41; --accent-light: #003300; --border: rgba(0,255,65,0.3); --shadow: 0 0 20px rgba(0,255,65,0.1); font-family: 'JetBrains Mono', monospace; }
    body.linux { --bg: #1e1e2e; --card: rgba(30,30,46,0.9); --text: #cdd6f4; --sub: #a6adc8; --accent: #89b4fa; --accent-light: #313244; --border: rgba(137,180,250,0.3); --shadow: 0 12px 30px rgba(0,0,0,0.7); }
    body.terminal { --bg: #0c0c0c; --card: rgba(20,20,20,0.9); --text: #e0e0e0; --sub: #a0a0a0; --accent: #f0c674; --accent-light: #2a2a2a; --border: rgba(240,198,116,0.3); --shadow: 0 0 20px rgba(240,198,116,0.05); font-family: 'JetBrains Mono', monospace; }
    body.github { --bg: #0d1117; --card: rgba(22,27,34,0.9); --text: #c9d1d9; --sub: #8b949e; --accent: #58a6ff; --accent-light: #21262d; --border: rgba(48,54,61,0.6); --shadow: 0 12px 30px rgba(0,0,0,0.8); }
    body.study { --bg: #1a1a2e; --card: rgba(26,26,46,0.9); --text: #e2e8f0; --sub: #a0aec0; --accent: #f6ad55; --accent-light: #2d3748; --border: rgba(246,173,85,0.3); --shadow: 0 12px 30px rgba(0,0,0,0.6); }
    body.school { --bg: #2d1b3d; --card: rgba(45,27,61,0.9); --text: #f0e6f6; --sub: #c4b0d0; --accent: #bb86fc; --accent-light: #4a2d5e; --border: rgba(187,134,252,0.3); --shadow: 0 12px 30px rgba(0,0,0,0.6); }

    body { background: var(--bg); color: var(--text); }
    .card, .drawer, .settings-panel, .quiz-container, .word-card, .ex-card, .form-card, .formula, .nav-bar, .hero {
      background: var(--card);
      border-color: var(--border);
      color: var(--text);
    }
    .word-en, .ex-en, .tense-name-en, .pattern, .formula, .signal-chip, .dd-item .en, .cur-en {
      color: var(--text);
    }
    .word-ar, .ex-ar, .sub, .desc, .signals-note, .quiz-progress, .drawer-stats, .eyebrow, .section-label {
      color: var(--sub);
    }
    .accent-bg { background: var(--accent); color: #fff; }
    .accent-border { border-color: var(--accent); }
    .accent-text { color: var(--accent); }
    .bg-accent-light { background: var(--accent-light); }

    /* ===== LAYOUT ===== */
    .app-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .menu-btn, .settings-btn {
      background: var(--card); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 60px;
      padding: 12px 16px; font-size: 1.2rem;
      box-shadow: var(--shadow); cursor: pointer;
      transition: 0.2s; display: flex; align-items: center; justify-content: center;
      min-width: 50px; color: var(--text);
    }
    .menu-btn:hover, .settings-btn:hover { background: var(--accent-light); border-color: var(--accent); }
    .search-wrapper {
      flex: 1; min-width: 140px; display: flex;
      background: var(--card); backdrop-filter: blur(8px);
      border-radius: 60px; border: 1px solid var(--border);
      box-shadow: var(--shadow); padding: 4px 8px 4px 4px; align-items: center;
    }
    .search-wrapper i { color: var(--sub); padding: 0 10px; }
    #searchInput {
      flex: 1; background: transparent; border: none;
      padding: 14px 6px; font-size: 1rem; color: var(--text); outline: none;
    }
    #searchInput::placeholder { color: var(--sub); opacity: 0.6; }

    /* Drawer */
    .drawer {
      position: fixed; top: 0; right: 0; width: 290px; max-width: 80%; height: 100%;
      background: var(--card); backdrop-filter: blur(20px);
      border-left: 1px solid var(--border); box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      z-index: 999; transform: translateX(105%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      padding: 24px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 998; display: none; }
    .drawer-overlay.active { display: block; }
    .drawer-close { align-self: flex-start; background: none; border: none; font-size: 2rem; color: var(--text); cursor: pointer; margin-bottom: 10px; }
    .drawer-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border-radius: 14px; background: var(--bg); color: var(--text);
      font-weight: 500; border: 1px solid transparent; transition: 0.2s; cursor: pointer;
    }
    .drawer-item:hover { background: var(--accent-light); border-color: var(--accent); }
    .drawer-item i { width: 28px; color: var(--accent); font-size: 1.2rem; }
    .drawer-divider { border-top: 1px solid var(--border); margin: 8px 0; }
    .drawer-stats { font-size: 0.8rem; color: var(--sub); padding: 10px 12px; }

    /* sections */
    .section { display: none; animation: fade 0.25s ease; }
    .section.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Word Grid */
    .word-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .word-card {
      background: var(--card); backdrop-filter: blur(8px);
      border-radius: 24px; padding: 16px 18px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .word-content { display: flex; flex-direction: column; flex: 2; min-width: 120px; }
    .word-en { font-weight: 700; font-size: 1.15rem; direction: ltr; text-align: left; }
    .word-ar { font-size: 0.95rem; margin-top: 2px; }
    .word-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .speak-btn {
      border: none; border-radius: 40px; padding: 6px 14px; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      transition: 0.2s; border: 1px solid transparent;
      background: var(--accent-light); color: var(--accent);
    }
    .speak-btn:hover { background: var(--accent); color: #fff; }
    .speak-btn.ar-btn { background: #e6f7e6; color: #2d7a2d; }
    .speak-btn.ar-btn:hover { background: #2d7a2d; color: #fff; }
    body.matrix .speak-btn, body.terminal .speak-btn { background: #1a3a1a; color: #00ff41; border-color: #00ff41; }
    body.matrix .speak-btn:hover, body.terminal .speak-btn:hover { background: #00ff41; color: #000; }

    /* ===== QUIZ ===== */
    .quiz-container {
      background: var(--card); backdrop-filter: blur(8px);
      border-radius: 24px; padding: 24px 18px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      margin: 18px 0 10px 0;
    }
    .quiz-question { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; line-height: 1.6; }
    .quiz-options { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
    .quiz-options button {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 60px; padding: 12px 22px; font-size: 0.95rem;
      color: var(--text); cursor: pointer; transition: 0.2s; flex: 1 0 auto;
    }
    .quiz-options button:hover { background: var(--accent-light); border-color: var(--accent); }
    .quiz-options button.correct { background: #22c55e; color: white; border-color: #22c55e; }
    .quiz-options button.wrong { background: #ef4444; color: white; border-color: #ef4444; }
    .quiz-input-area { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
    .quiz-input-area input {
      flex: 2; padding: 14px 18px; border-radius: 60px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 1rem; min-width: 130px;
    }
    .quiz-input-area button {
      background: var(--accent); border: none; padding: 14px 28px; border-radius: 60px;
      color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .quiz-input-area button:hover { filter: brightness(1.1); }
    .quiz-type-toggle { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .quiz-type-toggle button {
      background: var(--bg); border: 1px solid var(--border);
      padding: 8px 20px; border-radius: 40px; color: var(--sub);
      cursor: pointer; font-weight: 500; transition: 0.2s;
    }
    .quiz-type-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .quiz-feedback { font-weight: 600; margin: 10px 0; padding: 8px 0; }
    .quiz-progress { font-size: 0.85rem; color: var(--sub); margin-top: 12px; }

    /* ===== GRAMMAR ===== */
    .hero {
      background: var(--card); backdrop-filter: blur(8px);
      border-radius: 24px; padding: 30px 24px; margin-bottom: 20px;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .hero .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .1em; color: var(--accent); text-transform: uppercase; }
    .hero h1 { font-family: 'Markazi Text', serif; font-size: clamp(32px,5vw,48px); font-weight: 700; margin: 4px 0; }
    .hero .sub { font-size: 16px; max-width: 65ch; }

    .nav-bar {
      position: sticky; top: 0; z-index: 30;
      background: var(--card); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 12px 16px; margin-bottom: 24px;
    }
    .dd-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; padding: 12px 16px;
      font-family: inherit; font-weight: 700; font-size: 16px; cursor: pointer;
    }
    .dd-toggle .cur-en { font-family: 'JetBrains Mono', monospace; font-size: 12px; opacity: 0.8; margin-right: 10px; }
    .dd-toggle .arrow { transition: .2s; font-size: 14px; }
    .dd-toggle.open .arrow { transform: rotate(180deg); }
    .dd-list {
      position: absolute; top: calc(100% + 8px); right: 0; left: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow);
      max-height: 0; overflow: hidden; transition: max-height .25s ease; z-index: 40;
    }
    .dd-list.open { max-height: 70vh; overflow-y: auto; }
    .dd-group-label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--sub); letter-spacing: .1em; padding: 12px 16px 4px;
    }
    .dd-item {
      display: flex; align-items: baseline; gap: 8px;
      width: 100%; text-align: right; background: none; border: none;
      padding: 10px 16px; font-family: inherit; font-size: 15px; color: var(--text);
      cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .dd-item:hover { background: var(--accent-light); }
    .dd-item.active { background: var(--accent); color: #fff; font-weight: 700; }
    .dd-item .en { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--sub); }
    .dd-item.active .en { color: #fff; opacity: 0.8; }

    .panel { display: none; }
    .panel.active { display: block; animation: fade .25s ease; }
    .tense-head { margin-bottom: 20px; }
    .tense-name-en { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 13px; letter-spacing: .1em; }
    .tense-head h2 { font-family: 'Markazi Text', serif; font-size: 28px; margin: 4px 0 6px; }
    .tense-desc { color: var(--sub); font-size: 15px; max-width: 65ch; }

    .formula {
      background: var(--accent-light); color: var(--text);
      border-radius: 10px; padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace; font-size: clamp(13px,2.5vw,16px);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin: 18px 0; border: 1px solid var(--border);
    }
    .formula .piece { background: rgba(0,0,0,0.1); padding: 4px 10px; border-radius: 6px; }
    .formula .piece.h { color: var(--accent); }
    .formula .piece.b { color: #3b8b3b; }
    .formula .piece.v { color: #b85c5c; }
    .formula .plus { opacity: 0.5; }

    .section-label {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      letter-spacing: .08em; color: var(--sub); margin: 26px 0 10px; text-transform: uppercase;
    }
    .forms-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media(min-width:640px){ .forms-grid { grid-template-columns: 1fr 1fr 1fr; } }
    .form-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; border-top: 4px solid var(--accent);
    }
    .form-card.neg { border-top-color: #b85c5c; }
    .form-card.q { border-top-color: #d98e3a; }
    .form-card .lbl { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .form-card.aff .lbl { color: var(--accent); }
    .form-card.neg .lbl { color: #b85c5c; }
    .form-card.q .lbl { color: #d98e3a; }
    .form-card .pattern {
      font-family: 'JetBrains Mono', monospace; font-size: 13.5px;
      direction: ltr; text-align: left; color: var(--text);
    }

    .examples { display: grid; gap: 12px; }
    .ex-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
      border-right: 5px solid var(--accent);
    }
    .ex-card.alt { border-right-color: #d98e3a; }
    .ex-card.neg { border-right-color: #b85c5c; }
    .ex-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--sub); letter-spacing: .06em; margin-bottom: 4px; }
    .ex-en {
      font-family: 'JetBrains Mono', monospace; font-size: 16px;
      direction: ltr; text-align: left; margin-bottom: 6px;
    }
    .ex-en .hl { color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--accent); }
    .ex-ar { font-size: 15px; color: var(--sub); }

    .signals { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 0; }
    .signal-chip {
      font-family: 'JetBrains Mono', monospace;
      background: var(--accent-light); color: var(--text);
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    }
    .signals-note { font-size: 14px; color: var(--sub); margin: 8px 0 0; }

    /* Settings Panel */
    .settings-panel {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: var(--card); backdrop-filter: blur(20px);
      border-top-left-radius: 32px; border-top-right-radius: 32px;
      padding: 28px 22px 34px; box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
      z-index: 1000; transform: translateY(105%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; gap: 18px;
    }
    .settings-panel.open { transform: translateY(0); }
    .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .settings-row label { font-weight: 600; }
    .theme-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .theme-btns button {
      border: 2px solid var(--border); border-radius: 40px; padding: 6px 18px;
      background: var(--bg); color: var(--text); cursor: pointer;
      font-size: 0.75rem; transition: 0.2s;
    }
    .theme-btns button.active-theme { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 1px var(--accent); }
    .font-size-control { display: flex; align-items: center; gap: 16px; }
    .font-size-control button {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 40px; padding: 6px 18px; font-size: 1.4rem; cursor: pointer;
      color: var(--text);
    }
    .font-select { padding: 8px 16px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; }
    .settings-close { background: var(--accent); border: none; padding: 14px; border-radius: 60px; color: #fff; font-weight: 700; width: 100%; cursor: pointer; margin-top: 4px; }

    .hidden { display: none !important; }
    .badge-count { background: var(--accent-light); color: var(--accent); border-radius: 40px; padding: 2px 12px; font-size: 0.75rem; }
    footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 13px; color: var(--sub); font-family: 'JetBrains Mono', monospace; }
    @media (max-width: 480px) { .word-card { flex-direction: column; align-items: stretch; } .word-actions { justify-content: flex-start; } body { padding: 12px 8px 100px 8px; } }
  </style>
</head>
<body>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<nav class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose"><i class="fas fa-times"></i></button>
  <div class="drawer-item" data-section="dictionary"><i class="fas fa-book-open"></i> القاموس</div>
  <div class="drawer-item" data-section="grammar"><i class="fas fa-language"></i> القواعد</div>
  <div class="drawer-item" data-section="quiz"><i class="fas fa-pencil-alt"></i> الاختبارات</div>
  <div class="drawer-divider"></div>
  <div class="drawer-item" data-section="settings"><i class="fas fa-sliders-h"></i> الإعدادات</div>
  <div class="drawer-stats"><i class="fas fa-database"></i> <span id="totalWordsCount">0</span> كلمة</div>
</nav>

<!-- Header -->
<div class="app-header">
  <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="ابحث عن كلمة..." autocomplete="off">
  </div>
  <button class="settings-btn" id="settingsToggle"><i class="fas fa-palette"></i></button>
</div>

<!-- ===== DICTIONARY SECTION ===== -->
<div id="dictionarySection" class="section active">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; padding:0 4px;">
    <span style="font-weight:500; color:var(--sub);"><i class="fas fa-chevron-left"></i> النتائج</span>
    <span class="badge-count" id="resultCount">0</span>
  </div>
  <div class="word-grid" id="wordGrid"></div>
</div>

<!-- ===== GRAMMAR SECTION ===== -->
<div id="grammarSection" class="section">
  <div class="hero">
    <div class="eyebrow">English Grammar / القواعد الإنجليزية</div>
    <h1>أزمنة اللغة الإنجليزية</h1>
    <p class="sub">الاثنا عشر زمنًا الأساسية — التركيب، حالات الإثبات والنفي والسؤال، كلمات الإشارة، وأمثلة متعددة لكل زمن.</p>
  </div>
  <div class="nav-bar">
    <div class="nav-inner" style="position:relative;">
      <button class="dd-toggle" id="ddToggle">
        <span><span id="ddCurAr">—</span> <span class="cur-en" id="ddCurEn"></span></span>
        <span class="arrow">▾</span>
      </button>

        desc:"لفعل سيكون مستمرًا في لحظة معينة في المستقبل.",
        formula:[["will be","h"],["V-ing","v"]],
        forms:{ aff:"S + will be + V-ing", neg:"S + won't be + V-ing", q:"Will + S + be + V-ing ?" },
        signals:["at this time tomorrow","this time next week","while"],
        examples:[
          ["aff","I <span class='hl'>will be sleeping</span> at midnight.", "هكون نايم نص الليل."],
          ["aff","This time tomorrow, we <span class='hl'>will be flying</span> to Dubai.", "في نفس الوقت بكرة، هنكون طايرين دبي."],
          ["aff","She <span class='hl'>will be working</span> when you arrive.", "هي هتكون شغالة لما توصل."],
          ["neg","They <span class='hl'>won't be waiting</span> for us at the airport.", "هما مش هيكونوا مستنيينا في المطار."],
          ["neg","I <span class='hl'>won't be using</span> the car tonight.", "مش هكون مستخدم العربية الليلة."],
          ["q","What <span class='hl'>will</span> you <span class='hl'>be doing</span> at 8 PM?", "هتكون بتعمل إيه الساعة 8 بالليل؟"],
          ["q","Will she <span class='hl'>be staying</span> at home this time tomorrow?", "هل هتكون قاعدة في البيت في نفس الوقت بكرة؟"]
        ]
      },
      { id:"fut-perf", group:"المستقبل", nameAr:"المستقبل التام", nameEn:"Future Perfect",
        desc:"لفعل سينتهي قبل نقطة زمنية معينة في المستقبل.",
        formula:[["will have","h"],["V3 (past participle)","v"]],
        forms:{ aff:"S + will have + V3", neg:"S + won't have + V3", q:"Will + S + have + V3 ?" },
        signals:["by next year","by the time","before","by 2030"],
        examples:[
          ["aff","I <span class='hl'>will have finished</span> the report by Friday.", "هكون خلصت التقرير قبل الجمعة."],
          ["aff","She <span class='hl'>will have graduated</span> by next June.", "هي هتكون اتخرجت قبل يونيو الجاي."],
          ["aff","By the time you arrive, we <span class='hl'>will have left</span>.", "لما توصل، إحنا هنكون مشينا."],
          ["neg","They <span class='hl'>won't have built</span> the bridge by 2027.", "هما مش هيكونوا بنوا الكوبري قبل 2027."],
          ["neg","He <span class='hl'>won't have finished</span> by then.", "هو مش هيكون خلص بحلول وقتها."],
          ["q","Will you <span class='hl'>have finished</span> by then?", "هل هتكون خلصت بحلول وقتها؟"],
          ["q","Will she <span class='hl'>have arrived</span> before midnight?", "هل هتكون وصلت قبل نص الليل؟"]
        ]
      },
      { id:"fut-perf-cont", group:"المستقبل", nameAr:"المستقبل التام المستمر", nameEn:"Future Perfect Continuous",
        desc:"لفعل سيكون مستمرًا لفترة معينة حتى لحظة محددة في المستقبل.",
        formula:[["will have been","h"],["V-ing","v"]],
        forms:{ aff:"S + will have been + V-ing", neg:"S + won't have been + V-ing", q:"Will + S + have been + V-ing ?" },
        signals:["by next year (+ for)","for...by the time"],
        examples:[
          ["aff","By next month, I <span class='hl'>will have been working</span> here for 10 years.", "بحلول الشهر الجاي، هكون شغال هنا من 10 سنين."],
          ["aff","She <span class='hl'>will have been studying</span> for 5 hours by 6 PM.", "هي هتكون بتذاكر من 5 ساعات لحد الساعة 6."],
          ["aff","By 2030, they <span class='hl'>will have been living</span> here for two decades.", "بحلول 2030، هيكونوا عايشين هنا من عشرين سنة."],
          ["neg","He <span class='hl'>won't have been driving</span> for long by then.", "هو مش هيكون سايق من مدة طويلة بحلول وقتها."],
          ["neg","We <span class='hl'>won't have been waiting</span> for more than an hour.", "إحنا مش هنكون مستنيين أكتر من ساعة."],
          ["q","How long <span class='hl'>will</span> you <span class='hl'>have been working</span> by retirement?", "هتكون اشتغلت قد إيه لحد المعاش؟"],
          ["q","Will he <span class='hl'>have been driving</span> for 8 hours by the time he arrives?", "هل هيكون بيسوق من 8 ساعات لما يوصل؟"]
        ]
      }
    ];

    // ============================================================
    // 3. DOM References
    // ============================================================
    const wordGrid = document.getElementById('wordGrid');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const menuToggle = document.getElementById('menuToggle');
    const drawer = document.getElementById('drawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerClose = document.getElementById('drawerClose');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsClose = document.getElementById('settingsClose');
    const dictionarySection = document.getElementById('dictionarySection');
    const grammarSection = document.getElementById('grammarSection');
    const quizSection = document.getElementById('quizSection');
    const quizQuestion = document.getElementById('quizQuestion');
    const quizOptions = document.getElementById('quizOptions');
    const quizInputArea = document.getElementById('quizInputArea');
    const quizFillInput = document.getElementById('quizFillInput');
    const quizFillBtn = document.getElementById('quizFillBtn');
    const quizFeedback = document.getElementById('quizFeedback');
    const quizNextBtn = document.getElementById('quizNextBtn');
    const quizResetBtn = document.getElementById('quizResetBtn');
    const quizProgress = document.getElementById('quizProgress');
    const fontDec = document.getElementById('fontDec');
    const fontInc = document.getElementById('fontInc');
    const fontSizeDisplay = document.getElementById('fontSizeDisplay');
    const fontSelect = document.getElementById('fontSelect');

    // ============================================================
    // 4. State
    // ============================================================
    let currentFilter = '';
    let quizMode = 'meaning';
    let quizQuestions = [];
    let quizIndex = 0;
    let quizAnswered = false;
    let currentQuizWord = null;

    // ============================================================
    // 5. Dictionary Functions
    // ============================================================
    function renderWords(filter = '') {
      const f = filter.trim().toLowerCase();
      const filtered = wordsData.filter(w => 
        w.en.toLowerCase().includes(f) || w.ar.includes(f)
      );
      resultCount.textContent = filtered.length;
      if (filtered.length === 0) {
        wordGrid.innerHTML = `<div class="word-card" style="justify-content:center;color:var(--sub);">🔍 لا توجد نتائج</div>`;
        return;
      }
      let html = '';
      for (let w of filtered) {
        html += `
          <div class="word-card">
            <div class="word-content">
              <span class="word-en">${w.en}</span>
              <span class="word-ar">${w.ar}</span>
            </div>
            <div class="word-actions">
              <button class="speak-btn" data-lang="en" data-text="${w.en}"><i class="fas fa-volume-up"></i> EN</button>
              <button class="speak-btn ar-btn" data-lang="ar" data-text="${w.ar}"><i class="fas fa-volume-up"></i> AR</button>
            </div>
          </div>
        `;
      }
      wordGrid.innerHTML = html;
      document.querySelectorAll('.speak-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          speakText(this.dataset.text, this.dataset.lang);
        });
      });
    }

    function speakText(text, lang) {
      if (!window.speechSynthesis) return alert('المتصفح لا يدعم النطق');
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = lang === 'ar' ? 'ar-SA' : 'en-US';
      utterance.rate = 0.85;
      speechSynthesis.speak(utterance);
    }

    // ============================================================
    // 6. Grammar Functions
    // ============================================================
    const groups = [...new Set(tenses.map(t=>t.group))];
    const ddList = document.getElementById('ddList');
    const ddToggle = document.getElementById('ddToggle');
    const ddCurAr = document.getElementById('ddCurAr');
    const ddCurEn = document.getElementById('ddCurEn');
    const panels = document.getElementById('panels');

    groups.forEach(g=>{
      const label = document.createElement('div');
      label.className = 'dd-group-label';
      label.textContent = g;
      ddList.appendChild(label);
      tenses.filter(t=>t.group===g).forEach(t=>{
        const item = document.createElement('button');
        item.className = 'dd-item';
        item.dataset.id = t.id;
        item.innerHTML = `${t.nameAr} <span class="en">${t.nameEn}</span>`;
        item.onclick = ()=>{ showTense(t.id); closeDD(); };
        ddList.appendChild(item);
      });
    });

    const tagLabel = { aff:['مثبت','aff'], neg:['منفي','neg'], q:['سؤال','q'] };

    tenses.forEach(t=>{
      const panel = document.createElement('section');
      panel.className = 'panel';
      panel.id = 'panel-'+t.id;

      const formulaHtml = t.formula.map(([txt,cls])=>{
        return `<span class="piece ${cls}">${txt}</span>`;
      }).filter(Boolean).join('<span class="plus"> + </span>');

      const formsHtml = `
        <div class="forms-grid">
          <div class="form-card aff"><div class="lbl">✔ مثبت</div><div class="pattern">${t.forms.aff}</div></div>
          <div class="form-card neg"><div class="lbl">✘ منفي</div><div class="pattern">${t.forms.neg}</div></div>
          <div class="form-card q"><div class="lbl">؟ سؤال</div><div class="pattern">${t.forms.q}</div></div>
        </div>`;

      const examplesHtml = t.examples.map((ex,i)=>{
        const [kind,en,ar] = ex;
        const cardCls = kind==='neg' ? 'neg' : (i%2 ? 'alt':'');
        const tagAr = tagLabel[kind][0];
        return `
          <div class="ex-card ${cardCls}">
            <div class="ex-tag">${tagAr}</div>
            <div class="ex-en">${en}</div>
            <div class="ex-ar">${ar}</div>
          </div>`;
      }).join('');

      const signalsHtml = t.signals.map(s=>`<span class="signal-chip">${s}</span>`).join('');

      panel.innerHTML = `
        <div class="tense-head">
          <div class="tense-name-en">${t.nameEn}</div>
          <h2>${t.nameAr}</h2>
          <p class="tense-desc">${t.desc}</p>
        </div>
        <div class="formula">${formulaHtml}</div>
        <p class="section-label">الحالات الثلاث للزمن</p>
        ${formsHtml}
        <p class="section-label">أمثلة</p>
        <div class="examples">${examplesHtml}</div>
        <p class="signals-note">كلمات إشارة شائعة:</p>
        <div class="signals">${signalsHtml}</div>
      `;
      panels.appendChild(panel);
    });

    function showTense(id){
      const t = tenses.find(x=>x.id===id);
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.dd-item').forEach(b=>b.classList.remove('active'));
      document.getElementById('panel-'+id).classList.add('active');
      const item = document.querySelector(`.dd-item[data-id="${id}"]`);
      if(item) item.classList.add('active');
      ddCurAr.textContent = t.nameAr;
      ddCurEn.textContent = t.nameEn;
      window.scrollTo({top: document.querySelector('.nav-bar').offsetTop, behavior:'smooth'});
    }

    function openDD(){ ddList.classList.add('open'); ddToggle.classList.add('open'); }
    function closeDD(){ ddList.classList.remove('open'); ddToggle.classList.remove('open'); }
    ddToggle.onclick = ()=>{ if(ddList.classList.contains('open')) closeDD(); else openDD(); };
    document.addEventListener('click',(e)=>{ if(!e.target.closest('.nav-inner')) closeDD(); });

    // ============================================================
    // 7. Quiz Functions
    // ============================================================
    function generateQuizQuestions(mode) {
      if (mode === 'grammar') {
        const shuffled = [...tenses].sort(() => Math.random() - 0.5);
        const count = Math.min(10, shuffled.length);
        const selected = shuffled.slice(0, count);
        return selected.map(t => {
          const ex = t.examples[Math.floor(Math.random() * t.examples.length)];
          const sentence = ex[1].replace(/<[^>]*>/g, '');
          const wrongs = tenses.filter(x => x.id !== t.id).sort(() => Math.random() - 0.5).slice(0, 3);
          const opts = [t.nameAr, ...wrongs.map(x => x.nameAr)];
          return { 
            word: { en: sentence, ar: t.nameAr, tense: t.id }, 
            options: opts.sort(() => Math.random() - 0.5),
            isGrammar: true,
            correctId: t.id
          };
        });
      } else {
        const shuffled = [...wordsData].sort(() => Math.random() - 0.5);
        const count = Math.min(12, shuffled.length);
        const selected = shuffled.slice(0, count);
        return selected.map(w => {
          if (mode === 'meaning') {
            const wrongs = wordsData.filter(x => x.en !== w.en).sort(() => Math.random() - 0.5).slice(0, 3);
            const opts = [w.ar, ...wrongs.map(x => x.ar)];
            return { word: w, options: opts.sort(() => Math.random() - 0.5), isGrammar: false };
          } else {
            return { word: w, options: [], isGrammar: false };
          }
        });
      }
    }

    function startQuiz(mode) {
      quizMode = mode;
      quizQuestions = generateQuizQuestions(mode);
      quizIndex = 0;
      quizAnswered = false;
      quizFeedback.textContent = '';
      quizFeedback.className = 'quiz-feedback';
      showQuizQuestion();
    }

    function showQuizQuestion() {
      if (quizIndex >= quizQuestions.length) {
        quizQuestion.textContent = '🎉 انتهى الاختبار! اضغط "إعادة" للبدء من جديد';
        quizOptions.innerHTML = '';
        quizInputArea.classList.add('hidden');
        quizFeedback.textContent = 'أحسنت!';
        quizProgress.textContent = `${quizIndex} / ${quizQuestions.length}`;
        return;
      }
      const q = quizQuestions[quizIndex];
      currentQuizWord = q.word;
      quizAnswered = false;
      quizFeedback.textContent = '';
      quizFeedback.className = 'quiz-feedback';

      if (q.isGrammar) {
        quizQuestion.textContent = `⏳ اختر الزمن الصحيح للجملة: "${q.word.en}"`;
        quizOptions.classList.remove('hidden');
        quizInputArea.classList.add('hidden');
        let optsHtml = '';
        for (let opt of q.options) {
          optsHtml += `<button data-answer="${opt}">${opt}</button>`;
        }
        quizOptions.innerHTML = optsHtml;
        quizOptions.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', function() {
            if (quizAnswered) return;
            const selected = this.textContent;
            const correct = currentQuizWord.ar;
            if (selected === correct) {
              this.classList.add('correct');
              quizFeedback.textContent = '✅ إجابة صحيحة!';
              quizFeedback.style.color = '#22c55e';
            } else {
              this.classList.add('wrong');
              quizFeedback.textContent = `❌ خطأ، الزمن الصحيح: "${correct}"`;
              quizFeedback.style.color = '#ef4444';
              quizOptions.querySelectorAll('button').forEach(b => {
                if (b.textContent === correct) b.classList.add('correct');
              });
            }
            quizAnswered = true;
          });
        });
      } else if (quizMode === 'meaning') {
        quizQuestion.textContent = `🔹 اختر المعنى الصحيح لكلمة: "${q.word.en}"`;
        quizOptions.classList.remove('hidden');
        quizInputArea.classList.add('hidden');
        let optsHtml = '';
        for (let opt of q.options) {
          optsHtml += `<button data-answer="${opt}">${opt}</button>`;
        }
        quizOptions.innerHTML = optsHtml;
        quizOptions.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', function() {
            if (quizAnswered) return;
            const selected = this.textContent;
            const correct = currentQuizWord.ar;
            if (selected === correct) {
              this.classList.add('correct');
              quizFeedback.textContent = '✅ إجابة صحيحة!';
              quizFeedback.style.color = '#22c55e';
            } else {
              this.classList.add('wrong');
              quizFeedback.textContent = `❌ خطأ، الإجابة: "${correct}"`;
              quizFeedback.style.color = '#ef4444';
              quizOptions.querySelectorAll('button').forEach(b => {
                if (b.textContent === correct) b.classList.add('correct');
              });
            }
            quizAnswered = true;
          });
        });
      } else {
        quizOptions.classList.add('hidden');
        quizInputArea.classList.remove('hidden');
        const wordEn = q.word.en;
        let display = '';
        if (wordEn.length <= 4) {
          display = wordEn[0] + '___' + wordEn[wordEn.length-1];
        } else {
          display = wordEn.slice(0,2) + '___' + wordEn.slice(-2);
        }
        quizQuestion.textContent = `✏️ أكمل الكلمة: "${display}" (المعنى: ${q.word.ar})`;
        quizFillInput.value = '';
        quizFillInput.focus();
        quizFillBtn.onclick = function() {
          if (quizAnswered) return;
          const userAns = quizFillInput.value.trim().toLowerCase();
          const correct = currentQuizWord.en.toLowerCase();
          if (userAns === correct) {
            quizFeedback.textContent = '✅ صحيح!';
            quizFeedback.style.color = '#22c55e';
          } else {
            quizFeedback.textContent = `❌ الإجابة: "${currentQuizWord.en}"`;
            quizFeedback.style.color = '#ef4444';
          }
          quizAnswered = true;
        };
        quizFillInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') quizFillBtn.click();
        });
      }
      quizProgress.textContent = `${quizIndex+1} / ${quizQuestions.length}`;
    }

    function nextQuizQuestion() {
      if (quizIndex >= quizQuestions.length) { startQuiz(quizMode); return; }
      quizIndex++;
      showQuizQuestion();
    }

    // ============================================================
    // 8. Navigation
    // ============================================================
    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      if (section === 'dictionary') {
        dictionarySection.classList.add('active');
        renderWords(currentFilter);
      } else if (section === 'grammar') {
        grammarSection.classList.add('active');
        const activePanel = document.querySelector('.panel.active');
        if (!activePanel) showTense(tenses[0].id);
      } else if (section === 'quiz') {
        quizSection.classList.add('active');
        if (quizQuestions.length === 0 || quizIndex >= quizQuestions.length) startQuiz('meaning');
      } else if (section === 'settings') {
        settingsPanel.classList.toggle('open');
      }
      closeDrawer();
    }

    function openDrawer() { drawer.classList.add('open'); drawerOverlay.classList.add('active'); }
    function closeDrawer() { drawer.classList.remove('open'); drawerOverlay.classList.remove('active'); }

    // ============================================================
    // 9. Events
    // ============================================================
    searchInput.addEventListener('input', function() {
      currentFilter = this.value;
      if (dictionarySection.classList.contains('active')) renderWords(currentFilter);
    });

    menuToggle.addEventListener('click', openDrawer);
    drawerClose.addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    document.querySelectorAll('.drawer-item').forEach(item => {
      item.addEventListener('click', function() {
        const section = this.dataset.section;
        if (section === 'settings') {
          settingsPanel.classList.toggle('open');
          closeDrawer();
        } else {
          showSection(section);
        }
      });
    });

    settingsToggle.addEventListener('click', () => settingsPanel.classList.toggle('open'));
    settingsClose.addEventListener('click', () => settingsPanel.classList.remove('open'));

    // Theme
    const themeButtons = document.querySelectorAll('.theme-btns button');
    themeButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        const theme = this.dataset.theme;
        document.body.className = theme;
        themeButtons.forEach(b => b.classList.remove('active-theme'));
        this.classList.add('active-theme');
        localStorage.setItem('theme', theme);
      });
    });

    // Font
    fontSelect.addEventListener('change', function() {
      const font = this.value;
      document.body.style.fontFamily = font + ', sans-serif';
      localStorage.setItem('font', font);
    });

    // Font Size
    let currentFontSize = parseInt(getComputedStyle(document.body).fontSize) || 16;
    function updateFontSize() {
      document.body.style.fontSize = currentFontSize + 'px';
      fontSizeDisplay.textContent = currentFontSize;
      localStorage.setItem('fontSize', currentFontSize);
    }
    fontDec.addEventListener('click', () => { if (currentFontSize > 12) { currentFontSize--; updateFontSize(); } });
    fontInc.addEventListener('click', () => { if (currentFontSize < 28) { currentFontSize++; updateFontSize(); } });

    // Quiz Type
    document.querySelectorAll('.quiz-type-toggle button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.quiz-type-toggle button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        startQuiz(this.dataset.quiz);
      });
    });
    quizNextBtn.addEventListener('click', nextQuizQuestion);
    quizResetBtn.addEventListener('click', () => startQuiz(quizMode));

    // ============================================================
    // 10. Init
    // ============================================================
    function init() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.body.className = savedTheme;
      themeButtons.forEach(b => {
        if (b.dataset.theme === savedTheme) b.classList.add('active-theme');
      });
      const savedFont = localStorage.getItem('font') || 'Tajawal';
      fontSelect.value = savedFont;
      document.body.style.fontFamily = savedFont + ', sans-serif';
      const savedSize = parseInt(localStorage.getItem('fontSize'));
      if (savedSize && savedSize >= 12 && savedSize <= 28) {
        currentFontSize = savedSize;
        updateFontSize();
      } else {
        updateFontSize();
      }
      renderWords('');
      showTense(tenses[0].id);
      startQuiz('meaning');
      showSection('dictionary');
    }
    init();

    // ============================================================
    // 11. Service Worker (PWA) - تسجيل الـ Service Worker
    // ============================================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('✅ Service Worker مسجل بنجاح'))
        .catch(err => console.log('❌ فشل تسجيل الـ Service Worker:', err));
    }

  })();
</script>
</body>
</html>
